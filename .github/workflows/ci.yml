name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint (ruff)
        run: ruff check pipeline/ scripts/

      - name: Import smoke test
        run: |
          python -c "
          from pipeline.league import EPL, WORLD_CUP
          from pipeline.features.build import build_features
          from pipeline.eval.grade import grade_league
          from pipeline.models import result, scoreline, moe
          print('Python imports OK')
          "

  node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check + build
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@placeholder.us-east-1.aws.neon.tech/neondb?sslmode=require
          GROQ_API_KEY: placeholder
        run: npm run build
